name: CD — Deploy ConsoTelecom v2.0

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  # ── Deploy backend ───────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: []

    steps:
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script: |
            set -e
            cd /opt/consotelecom

            echo "=== Pull latest ==="
            git pull origin main

            echo "=== Rebuild backend ==="
            docker compose up -d --build backend

            echo "=== Wait for backend health ==="
            sleep 15

            echo "=== Run migrations ==="
            docker compose exec -T backend alembic upgrade head

            echo "=== Health check ==="
            curl -sf http://localhost:8000/api/health && echo "Backend OK" || (echo "Backend KO" && exit 1)

            echo "=== Prune unused images ==="
            docker image prune -f

            echo "Backend deployed at $(date)"

  # ── Deploy backoffice ────────────────────────────────────────────────────────
  deploy-backoffice:
    name: Deploy backoffice
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: [deploy-backend]

    steps:
      - name: Deploy backoffice via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script: |
            set -e
            cd /opt/consotelecom

            echo "=== Rebuild backoffice ==="
            docker compose up -d --build backoffice

            echo "=== Health check backoffice ==="
            sleep 5
            curl -sf http://localhost:3000/ && echo "Backoffice OK" || echo "Backoffice KO"

            echo "Backoffice deployed at $(date)"
