version: "3.9"

services:
  # ── PostgreSQL database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: consotelecom
      POSTGRES_PASSWORD: ${DB_PASSWORD:-consotelecom}
      POSTGRES_DB: consotelecom
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consotelecom -d consotelecom"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://consotelecom:${DB_PASSWORD:-consotelecom}@db:5432/consotelecom
      DATABASE_SYNC_URL: postgresql://consotelecom:${DB_PASSWORD:-consotelecom}@db:5432/consotelecom
      SECRET_KEY: ${SECRET_KEY:-CHANGE_ME_64_HEX_IN_PRODUCTION}
      DEBUG: ${DEBUG:-false}
      ALLOWED_ORIGINS: '["http://localhost:3000","http://backoffice","https://admin.consotelecom.app"]'
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@edefence.tech}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-CHANGE_ME_STRONG_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Flutter Web back-office ──────────────────────────────────────────────────
  backoffice:
    build:
      context: ./backoffice
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    name: consotelecom_pgdata
