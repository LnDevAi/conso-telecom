worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    upstream backend {
        server backend:8000;
    }
    upstream backoffice {
        server backoffice:80;
    }

    server {
        listen 80;
        server_name api.consotelecom.edefence.tech;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name api.consotelecom.edefence.tech;

        ssl_certificate /etc/letsencrypt/live/api.consotelecom.edefence.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.consotelecom.edefence.tech/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        client_max_body_size 10M;

        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }

    server {
        listen 80;
        server_name admin.consotelecom.edefence.tech;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name admin.consotelecom.edefence.tech;

        ssl_certificate /etc/letsencrypt/live/admin.consotelecom.edefence.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.consotelecom.edefence.tech/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        location / {
            proxy_pass http://backoffice;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            try_files $uri $uri/ /index.html;
        }
    }
}
